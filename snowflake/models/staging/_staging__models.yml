version: 2

models:
  - name: stg_yellow_taxi_trips
    description: >
      Cleaned and renamed view over raw yellow taxi trip records.
      All columns are cast to explicit types and renamed to snake_case.
      A surrogate trip_id is generated via dbt_utils.generate_surrogate_key.
      No rows are filtered at staging; filtering happens in the curated layer.
    columns:
      - name: trip_id
        description: "Surrogate key generated from pickup/dropoff timestamps, locations, vendor, and fare."
        data_tests:
          - not_null
      - name: vendor_id
        description: "TPEP provider ID."
        data_tests:
          - not_null
      - name: pickup_datetime
        description: "Timestamp when meter was engaged."
        data_tests:
          - not_null
      - name: dropoff_datetime
        description: "Timestamp when meter was disengaged."
        data_tests:
          - not_null
      - name: passenger_count
        description: "Number of passengers."
      - name: trip_distance_miles
        description: "Trip distance in miles per the taximeter."
      - name: rate_code_id
        description: "Rate code at end of trip."
      - name: store_and_fwd_flag
        description: "Y/N flag for store-and-forward trips."
      - name: pickup_location_id
        description: "TLC Taxi Zone ID for pickup."
        data_tests:
          - not_null
      - name: dropoff_location_id
        description: "TLC Taxi Zone ID for dropoff."
        data_tests:
          - not_null
      - name: payment_type_id
        description: "Numeric payment method code."
      - name: fare_amount
        description: "Metered fare amount in dollars."
      - name: total_amount
        description: "Total charged amount in dollars."

  - name: stg_taxi_zone_lookup
    description: >
      Cleaned and renamed view over the taxi zone reference table.
      Maps location IDs to borough, zone name, and service zone.
    columns:
      - name: location_id
        description: "Unique taxi zone identifier (1-265)."
        data_tests:
          - unique
          - not_null
      - name: borough
        description: "NYC borough name."
        data_tests:
          - not_null
      - name: zone_name
        description: "Name of the taxi zone."
        data_tests:
          - not_null
      - name: service_zone
        description: "Service category (Yellow Zone, Boro Zone, Airports, EWR, N/A)."
        data_tests:
          - not_null
